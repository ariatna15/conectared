<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - ConectaRed</title>

    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <!-- HEADER -->
    <header class="landing-header">

        <div class="header-brand">
            <img src="../../images/logo-conectared.png" alt="Logo ConectaRed" class="logo">

            <span class="logo-text">
                Conecta<span class="logo-highlight">Red</span>
            </span>
        </div>

        <nav class="header-nav">
            <a href="#seccion-hero" class="nav-link">Inicio</a>
            <a href="#seccion-mentores" class="nav-link">Mentores</a>
            <a href="#seccion-recursos-educativos" class="nav-link">Recursos</a>
        </nav>

        <div class="header-actions">
            <a href="/pages/login/login.html" class="btn-login">
                Iniciar sesión
            </a>

            <a href="./register/register.html" class="btn-unete">
                Únete
            </a>
        </div>

    </header>


    <!-- LOGIN -->
    <main class="login-container">

        <form id="loginForm" class="login-card">

            <h1>INICIAR SESIÓN</h1>

            <div class="input-group">
                <label>Correo electrónico</label>
                <input type="email" id="email" placeholder="correo@conectared.com" required>
            </div>

            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="********" required>
            </div>

            <div class="forgot-password">
                <a href="../auth/forgot-password.html">
                    ¿Olvidaste tu contraseña?
                </a>
                <p class="register-link">
                    ¿No tienes cuenta?
                    <a href="./register/register.html">Regístrate aquí</a>
                </p>
            </div>

            <button type="submit" class="login-btn">
                Iniciar Sesión
            </button>

            <p id="errorMessage"></p>

        </form>

    </main>

    <div id="footer-container"></div>

    <script src="../../js/main.js"></script>
    <script src="../../js/login.js"></script>

</body>

</html>
